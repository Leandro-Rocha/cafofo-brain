services:
  cafofo-brain:
    image: ghcr.io/leandro-rocha/cafofo-brain:latest
    container_name: cafofo-brain
    restart: unless-stopped
    environment:
      - PORT=3030
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - brain-data:/app/data
    ports:
      - "3030:3030"

volumes:
  brain-data:
