services:
  cafofo-brain:
    build: .
    container_name: cafofo-brain
    restart: unless-stopped
    environment:
      - PORT=3030
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./personas.yml:/app/personas.yml:ro
    ports:
      - "3030:3030"
